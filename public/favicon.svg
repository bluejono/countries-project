<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0a0a" stroke="#404040" stroke-width="2"/>

  <!-- Globe meridians / parallels -->
  <!-- Equator -->
  <ellipse cx="32" cy="32" rx="30" ry="9" stroke="#525252" stroke-width="1.5" fill="none"/>
  <!-- Upper latitude -->
  <ellipse cx="32" cy="20" rx="21" ry="6" stroke="#404040" stroke-width="1" fill="none"/>
  <!-- Lower latitude -->
  <ellipse cx="32" cy="44" rx="21" ry="6" stroke="#404040" stroke-width="1" fill="none"/>

  <!-- Central meridian (vertical) -->
  <ellipse cx="32" cy="32" rx="9" ry="30" stroke="#525252" stroke-width="1.5" fill="none"/>
  <!-- Side meridian (left) -->
  <path d="M 14 32 Q 20 2 32 2 Q 20 32 20 62 Q 20 52 14 32" stroke="#404040" stroke-width="1" fill="none"/>
  <!-- Side meridian (right) -->
  <path d="M 50 32 Q 44 2 32 2 Q 44 32 44 62 Q 44 52 50 32" stroke="#404040" stroke-width="1" fill="none"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" stroke="#737373" stroke-width="1.5" fill="none"/>

  <!-- Highlight dot (top) -->
  <circle cx="32" cy="4" r="2" fill="#a3a3a3"/>
  <circle cx="32" cy="60" r="2" fill="#a3a3a3"/>
</svg>